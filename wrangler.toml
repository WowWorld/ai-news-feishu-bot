name = "ai-news-feishu-bot"
main = "src/index.js"
compatibility_date = "2024-09-23"

# ───────────────────────────────────────────────
# Cron Triggers 定时触发（默认每 2 小时执行一次，及时捕捉额度重置消息）
# 额度重置类消息时效性强，建议高频检查
# 修改下方表达式即可调整推送频率
# 文档：https://developers.cloudflare.com/workers/configuration/cron-triggers/
# ───────────────────────────────────────────────
[triggers]
crons = ["0 */2 * * *"]

# ───────────────────────────────────────────────
# 非敏感环境变量（可直接提交到仓库）
# 敏感信息（FEISHU_WEBHOOK_URL / FEISHU_WEBHOOK_SECRET）
# 请用 `wrangler secret put` 设置，不要写在这里
# ───────────────────────────────────────────────
[vars]
# 每次推送最多展示的新闻条数
MAX_ITEMS = "10"
# 新闻摘要最大字符数
SUMMARY_MAX_LENGTH = "280"
# 单个源最多抓取的条数
MAX_ITEMS_PER_SOURCE = "30"
# 抓取超时（毫秒）
FETCH_TIMEOUT_MS = "20000"
# RSS 代理 URL 模板（含 {url} 占位符）
# xcancel.com 在 Cloudflare 后面，CF Workers 无法直连，需通过代理获取
# 设为空字符串则直连
RSS_PROXY = "https://api.allorigins.win/raw?url={url}"
# 是否启用中文翻译（默认开启，设为 "false" 关闭）
TRANSLATE_ENABLED = "true"
# 关键词过滤（逗号分隔，命中任一关键词才推送；留空则推送全部）
# 默认聚焦 OpenAI/ChatGPT 额度用量重置类消息
KEYWORDS = "reset,usage,limit,quota,banked,codex,5-hour,5 hour,rate limit,credit,billing,capacity,throttl,额度,重置,用量,限制"
# 默认 RSS 新闻源（仅监测 Tibo 的 X/Twitter）
# 通过 xcancel.com（免费 Nitter 实例）获取 RSS
RSS_SOURCES = """
[
  {"name": "Tibo (@thsottiaux)", "url": "https://xcancel.com/thsottiaux/rss"}
]
"""

# ───────────────────────────────────────────────
# Workers KV 命名空间：用于新闻去重
# 部署前请先创建：
#   npx wrangler kv namespace create NEWS_KV
# 然后将返回的 id 填到下方，或通过 wrangler 绑定
# 文档：https://developers.cloudflare.com/workers/runtime-apis/kv/
# ───────────────────────────────────────────────
[[kv_namespaces]]
binding = "NEWS_KV"
id = "7cfe8acc41d24b9f89cd4f24c9bbc6ba"

# ───────────────────────────────────────────────
# 可观测性：开启日志
# ───────────────────────────────────────────────
[observability]
enabled = true
